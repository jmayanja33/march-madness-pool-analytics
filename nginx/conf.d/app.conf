# Nginx reverse-proxy configuration for production.
#
# Two server blocks:
#   :80  — serves Let's Encrypt ACME HTTP-01 challenge files; redirects
#           everything else to HTTPS.
#   :443 — terminates TLS, proxies API routes to the FastAPI backend, and
#           serves the compiled React SPA for all other requests.
#
# Replace every occurrence of "mmthepool.com" with your actual FQDN before
# running init-letsencrypt.sh.

# ── HTTP (port 80) ────────────────────────────────────────────────────────────
server {
    listen 80;
    server_name mmthepool.com;

    # Serve the ACME HTTP-01 challenge files written by Certbot.
    # Let's Encrypt hits this path to verify domain ownership.
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirect all other HTTP traffic to HTTPS.
    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS (port 443) ──────────────────────────────────────────────────────────
server {
    listen 443 ssl;
    server_name mmthepool.com;

    # TLS certificates — written by Certbot into the shared volume.
    ssl_certificate     /etc/letsencrypt/live/mmthepool.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/mmthepool.com/privkey.pem;

    # Recommended TLS settings provided by Certbot / Let's Encrypt.
    # These files are created by init-letsencrypt.sh before nginx starts.
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # ── API routes → FastAPI backend ──────────────────────────────────────────
    # All backend API calls are namespaced under /api/ so they never collide
    # with React Router client-side paths (e.g. /analyze, /info).
    location /api/ {
        proxy_pass         http://backend:8000;

        # Forward the real client IP and protocol so the backend can log them.
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── Frontend SPA ──────────────────────────────────────────────────────────
    # Serve the built React static files. try_files falls back to index.html so
    # that React Router handles client-side navigation correctly.
    location / {
        root       /usr/share/nginx/html;
        try_files  $uri $uri/ /index.html;
    }
}
