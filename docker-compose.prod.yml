# Docker Compose — Production.
#
# Differences from docker-compose.yml (local dev):
#   - backend and nginx use pre-built images from ghcr.io (pushed by CI) rather
#     than building from source — no Docker build happens on the server.
#   - nginx service replaces the raw frontend port exposure; it terminates TLS
#     and proxies API requests to the backend.
#   - certbot service runs alongside nginx and auto-renews certificates at 04:00 EST every 2 weeks.
#   - backend and chromadb ports are NOT published to the host; they are only
#     reachable inside the Docker-internal network.
#   - backend runs without --reload.
#
# Before first run:
#   1. Set DOMAIN in the environment or export it in your shell.
#   2. Run:  ./init-letsencrypt.sh
#   3. Then: docker compose -f docker-compose.prod.yml up -d
#
# Access:
#   https://yourdomain.com   — the full application

services:

  # ── ChromaDB vector database ────────────────────────────────────────────────
  # Internal only — not exposed to the host.
  chromadb:
    image: chromadb/chroma:latest
    restart: unless-stopped
    volumes:
      - ./data/vector_db:/data

  # ── FastAPI backend ──────────────────────────────────────────────────────────
  # Internal only — nginx proxies traffic to it; the port is not published.
  # Image is built and pushed to GHCR by the CI pipeline.
  backend:
    image: ghcr.io/jmayanja33/mmthepool-backend:latest
    restart: unless-stopped
    volumes:
      - ./data:/app/data   # prediction JSON files
    environment:
      - CHROMA_HOST=chromadb
      - CHROMA_PORT=8000
    depends_on:
      - chromadb
    # Override dev CMD: no --reload in production.
    command: ["uv", "run", "uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000"]
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/')"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s

  # ── Nginx reverse proxy + frontend ──────────────────────────────────────────
  # Serves the pre-built React static files and terminates TLS.
  # Image is built and pushed to GHCR by the CI pipeline.
  nginx:
    image: ghcr.io/jmayanja33/mmthepool-nginx:latest
    restart: unless-stopped
    ports:
      - "80:80"    # HTTP — ACME challenge + redirect to HTTPS
      - "443:443"  # HTTPS — production traffic
    volumes:
      # Nginx server-block configuration (replace yourdomain.com first).
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      # Shared Let's Encrypt certificate store written by certbot.
      - ./data/certbot/conf:/etc/letsencrypt:ro
      # Webroot directory for ACME HTTP-01 challenge files.
      - ./data/certbot/www:/var/www/certbot:ro
    depends_on:
      backend:
        condition: service_healthy
    # Reload nginx config every 6 h so renewed certs are picked up without
    # a full container restart.
    command: >
      /bin/sh -c "while :; do sleep 6h & wait $${!}; nginx -s reload; done & nginx -g 'daemon off;'"

  # ── Certbot ─────────────────────────────────────────────────────────────────
  # Runs in the background and attempts certificate renewal every 2 weeks at
  # 04:00 EST (= 09:00 UTC).  Let's Encrypt certificates expire after 90 days;
  # Certbot only renews when fewer than 30 days remain, so a two-week cadence
  # provides plenty of lead time while minimising unnecessary API calls.
  certbot:
    image: certbot/certbot
    restart: unless-stopped
    volumes:
      # Same volumes as nginx so certbot can write new certs and challenge files.
      - ./data/certbot/conf:/etc/letsencrypt
      - ./data/certbot/www:/var/www/certbot
    # Loop: sleep until 09:00 UTC (04:00 EST), attempt renewal, then sleep
    # exactly 14 days before the next check.  Because 14 days is an exact
    # multiple of 24 h, every subsequent check also lands at 09:00 UTC.
    # Certbot only renews when fewer than 30 days remain on the certificate,
    # so a two-week cadence is safe and avoids unnecessary Let's Encrypt calls.
    entrypoint: >
      /bin/sh -c "trap exit TERM;
                  while :; do
                    SECS_NOW=$$(( $$(date -u +%H) * 3600 + $$(date -u +%M) * 60 + $$(date -u +%S) ));
                    TARGET=32400;
                    if [ $$SECS_NOW -lt $$TARGET ]; then
                      SLEEP=$$(($$TARGET - $$SECS_NOW));
                    else
                      SLEEP=$$((86400 - $$SECS_NOW + $$TARGET));
                    fi;
                    echo \"Next renewal check in $${SLEEP}s (04:00 EST / 09:00 UTC)\";
                    sleep $$SLEEP & wait $${!};
                    certbot renew;
                    echo \"Renewal attempt done. Next check in 14 days.\";
                    sleep 1209600 & wait $${!};
                  done"
